name: CI
on: [push, pull_request]

jobs:
  unit-test:
    strategy:
      matrix:
        os: [windows-latest]
        include:
          - os: windows-latest
            grcov: x86_64-pc-windows-msvc.zip
      fail-fast: true
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: -D warnings -C instrument-coverage
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: llvm-tools-preview
          override: true
      - uses: Swatinem/rust-cache@v1
      - name: Run tests
        run: cargo test -- --color always
        env:
          LLVM_PROFILE_FILE: "./cov/cov-%p-%m.profraw"
      - name: Install grcov (tar.bz2)
        if: ${{ endsWith(matrix.grcov, '.tar.bz2') }}
        run: |
          curl -L https://github.com/mozilla/grcov/releases/latest/download/grcov-${{matrix.grcov}} > grcov.tar.bz2
          tar xf ./grcov.tar.bz2
          ./grcov --version
        shell: bash
      - name: Install grcov (zip)
        if: ${{ endsWith(matrix.grcov, '.zip') }}
        run: |
          curl -L https://github.com/mozilla/grcov/releases/latest/download/grcov-${{matrix.grcov}} > grcov.zip
          unzip ./grcov.zip
          ./grcov --version
        shell: bash
      - name: Generate coverage results
        run: ./grcov.exe ./cov/*.profraw -s src --binary-path ./target/debug/ -t lcov --ignore-not-existing --ignore '/*' -o ./cov/lcov.info
      - uses: codecov/codecov-action@v2
        with:
          files: ./cov/lcov.info
      - uses: actions/upload-artifact@v3
        with:
          path: ./cov/lcov.info
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: rustfmt, clippy
          override: true
      - uses: Swatinem/rust-cache@v1
      - name: rustfmt
        run: cargo fmt -- --check --color always
      - name: clippy
        run: cargo clippy --color always -- -D warnings
